version: 2

project_name: s3_exporter

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: s3_exporter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    binary: s3_exporter
    main: ./s3_exporter.go
    ldflags:
      - -s -w

archives:
  - id: s3_exporter
    files:
      - README.md
      - LICENSE
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: s3_exporter
    package_name: s3-exporter
    vendor: Akamai SRE Observability Team
    homepage: https://github.com/linode-obs/s3_exporter
    maintainer: Akamai SRE Observability Team <dl-etg-compute-sre-o11y@akamai.com>
    description: Prometheus exporter for S3 bucket metrics
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: ./s3_exporter
        dst: /usr/local/bin/s3_exporter
        file_info:
          mode: 0755

dockers:
  - image_templates:
      - "ghcr.io/linode-obs/s3_exporter:{{ .Version }}"
      - "ghcr.io/linode-obs/s3_exporter:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/linode-obs/s3_exporter"
      - "--label=org.opencontainers.image.description=Prometheus exporter for S3 bucket metrics with HEAD method support"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'